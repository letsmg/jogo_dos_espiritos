name: 🚀 Build & Deploy Jogo (Static)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Criar Pacote de Deploy
        # Empacota apenas o que é necessário para o frontend
        run: zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*"

      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Deploy na pasta JOGO
        run: |
          scp -o StrictHostKeyChecking=no deploy.zip ubuntu@147.15.80.52:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            cd /var/www/jogo
            
            echo "🧹 Limpando pasta antiga..."
            # Mantém apenas o .env se você usar um para configurações JS
            sudo find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +
            
            echo "📦 Extraindo novos arquivos..."
            sudo unzip -o /tmp/deploy.zip -d .
            sudo rm /tmp/deploy.zip

            echo "🔐 Ajustando permissões..."
            sudo chown -R www-data:www-data /var/www/jogo
            sudo chmod -R 755 .
            
            echo "✅ Deploy Finalizado!"
          EOF