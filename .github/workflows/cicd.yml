name: 🚀 Deploy Spirit (Direto)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Create deploy package
        run: |
          # Organiza os arquivos mantendo a pasta public
          mkdir build-tmp
          # COPIA A PASTA INTEIRA (essencial para o seu Nginx que aponta para /public)
          cp -r public build-tmp/
          # Copia o .htaccess para dentro da public se ele existir na raiz
          [ -f .htaccess ] && cp .htaccess build-tmp/public/ || echo "Sem .htaccess"
          
          cd build-tmp
          zip -r ../deploy-spirit.zip .
          cd ..

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Executar Deploy
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          
          # Envia o arquivo correto
          scp -o StrictHostKeyChecking=no deploy-spirit.zip ubuntu@$SERVER_IP:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP << 'EOF'
            set -e
            
            BASE_DIR="/var/www/spirit"
            
            # 1. Garante que a pasta base existe
            sudo mkdir -p ${BASE_DIR}
            
            # 2. LIMPEZA TOTAL: Remove conteúdo interno (incluindo a public antiga)
            # Isso resolve o erro 500 se a pasta estivesse corrompida ou vazia
            sudo rm -rf ${BASE_DIR}/*
            
            # 3. Extrai o novo conteúdo (recriará a pasta /public no servidor)
            sudo unzip -o /tmp/deploy-spirit.zip -d ${BASE_DIR}
            
            # 4. Permissões para o Nginx (www-data)
            sudo chown -R www-data:www-data ${BASE_DIR}
            sudo chmod -R 755 ${BASE_DIR}
            
            # 5. Limpa o zip no servidor
            sudo rm /tmp/deploy-spirit.zip
            
            echo "✅ Deploy Spirit concluído com estrutura /public!"
          EOF

      - name: 🧹 Cleanup Runner
        if: always()
        run: rm -rf build-tmp deploy-spirit.zip