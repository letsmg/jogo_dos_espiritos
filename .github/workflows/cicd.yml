name: 🚀 Deploy Spirit (Direto)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Create deploy package
        run: |
          # Organiza apenas os arquivos necessários da pasta public
          mkdir build-tmp
          cp -r public/* build-tmp/
          [ -f .htaccess ] && cp .htaccess build-tmp/ || echo "Sem .htaccess"
          
          cd build-tmp
          zip -r ../deploy-spirit.zip .
          cd ..

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Executar Deploy
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"
          # CORRIGIDO: Nome do arquivo deve ser deploy-spirit.zip
          scp -o StrictHostKeyChecking=no deploy-spirit.zip ubuntu@$SERVER_IP:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP << 'EOF'
            set -e
            
            # 1. Define e cria a pasta se não existir
            sudo mkdir -p /var/www/spirit
            
            # 2. Limpa o conteúdo interno (apenas arquivos) sem deletar a pasta pai
            sudo rm -rf /var/www/spirit/*
            
            # 3. Extrai o novo conteúdo
            # CORRIGIDO: Nome do arquivo deve ser deploy-spirit.zip
            sudo unzip -o /tmp/deploy-spirit.zip -d /var/www/spirit
            
            # 4. Permissões finais
            sudo chown -R www-data:www-data /var/www/spirit
            sudo chmod -R 755 /var/www/spirit
            
            # 5. Limpa o zip no servidor
            sudo rm /tmp/deploy-spirit.zip
          EOF

      - name: 🧹 Cleanup Runner
        if: always()
        run: rm -rf build-tmp deploy-spirit.zip