name: 🚀 Deploy Jogo Spirit (Direto)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Create deploy package
        run: |
          # Organiza apenas os arquivos necessários da pasta public
          mkdir build-tmp
          cp -r public/* build-tmp/
          [ -f .htaccess ] && cp .htaccess build-tmp/ || echo "Sem .htaccess"
          
          cd build-tmp
          zip -r ../deploy-jogo.zip .
          cd ..

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Deploy to server
        run: |
          # Usa a variável de segredo para o IP, assim como no portfólio
          SERVER_IP="${{ secrets.SERVER_IP }}"

          # Envia o pacote para o diretório temporário
          scp -o StrictHostKeyChecking=no deploy-jogo.zip ubuntu@$SERVER_IP:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP << 'EOF'
            set -e
            
            # Definição do caminho do projeto
            BASE_DIR="/var/www/jogo"
            
            # 1. Garante que a pasta de destino existe
            sudo mkdir -p ${BASE_DIR}

            # 2. Descompacta e sobrescreve os arquivos antigos (-o)
            sudo unzip -o /tmp/deploy-jogo.zip -d ${BASE_DIR}

            # 3. Ajustar permissões para o Nginx
            sudo chown -R www-data:www-data ${BASE_DIR}
            sudo chmod -R 755 ${BASE_DIR}

            # 4. Limpeza do arquivo temporário no servidor
            sudo rm /tmp/deploy-jogo.zip
            
            echo "✅ Deploy do Jogo Spirit concluído!"
          EOF

      - name: 🧹 Cleanup Runner
        if: always()
        run: rm -rf build-tmp deploy-jogo.zip